<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Escanear código de barras</title>
<style>
  :root {
    --color-tinta: #26362F;
    --color-tinta-suave: #5C6B62;
    --color-crate: #3E7D4C;
    --color-crate-fondo: #E7F2E7;
    --color-sello: #B23A2E;
    --color-sello-fondo: #FBEAE7;
    --color-papel: #EDEEE4;
    --color-superficie: #FCFCF8;
    --color-borde: #D9D9C9;
    --radio: 12px;
    --sombra: 0 2px 10px rgba(38, 54, 47, 0.10);
    --fuente: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --fuente-mono: ui-monospace, 'SFMono-Regular', Menlo, Consolas, 'Courier New', monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--color-papel); color: var(--color-tinta);
    font-family: var(--fuente); min-height: 100vh;
  }
  .pantalla { padding: 20px 16px 40px; max-width: 480px; margin: 0 auto; }
  .encabezado { text-align: center; margin-bottom: 16px; }
  .encabezado h1 { font-size: 18px; font-weight: 800; margin: 0 0 4px; }
  .encabezado p { font-size: 13px; color: var(--color-tinta-suave); margin: 0; }
  #lector {
    border-radius: var(--radio); overflow: hidden; box-shadow: var(--sombra);
    border: 1px solid var(--color-borde); background: #000;
  }
  .estado {
    margin-top: 14px; padding: 12px 14px; border-radius: var(--radio);
    font-size: 13.5px; font-weight: 600; text-align: center;
  }
  .estado-espera { background: var(--color-superficie); color: var(--color-tinta-suave); border: 1px solid var(--color-borde); }
  .estado-error { background: var(--color-sello-fondo); color: var(--color-sello); }
  .estado-exito { background: var(--color-crate-fondo); color: var(--color-crate); }
  .codigo-detectado {
    font-family: var(--fuente-mono); font-size: 20px; font-weight: 700;
    word-break: break-all; margin-top: 8px;
  }
  .btn {
    display: block; width: 100%; padding: 16px 18px; margin-top: 10px; border: none;
    border-radius: var(--radio); font-family: var(--fuente); font-size: 15px; font-weight: 700;
    cursor: pointer; text-align: center;
  }
  .btn-primario { background: var(--color-tinta); color: #fff; }
  .btn-secundario { background: var(--color-superficie); color: var(--color-tinta); border: 2px solid var(--color-borde); }
  .btn-volver { background: var(--color-sello-fondo); color: var(--color-sello); border: 2px solid var(--color-sello); }
  .botones-fijos {
    margin-top: 14px;
  }
  .oculto { display: none !important; }
</style>
</head>
<body>

<div class="pantalla">
  <div class="encabezado">
    <h1>📷 Escanear código de barras</h1>
    <p>Apunta la cámara al código</p>
  </div>

  <div id="lector"></div>

  <div id="estado" class="estado estado-espera">Iniciando cámara…</div>

  <div id="resultado" class="oculto">
    <div class="estado estado-exito">
      ✅ Código detectado
      <div id="codigo-texto" class="codigo-detectado"></div>
    </div>
  </div>

  <!-- BOTONES FIJOS SIEMPRE VISIBLES -->
  <div class="botones-fijos">
    <button id="btn-manual" class="btn btn-secundario">✏️ Ingresar código manualmente</button>
    <button id="btn-volver" class="btn btn-volver">← Volver a la app</button>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  // ============================================================
  // SONIDO DE CAJA REGISTRADORA (Web Audio API)
  // ============================================================
  let contextoAudio = null;
  let audioListo = false;

  function inicializarAudio() {
    if (audioListo) return;
    try {
      contextoAudio = new (window.AudioContext || window.webkitAudioContext)();
      audioListo = true;
    } catch (e) {
      console.log('Audio no disponible');
    }
  }

  document.addEventListener('touchstart', inicializarAudio, { once: true });
  document.addEventListener('click', inicializarAudio, { once: true });

  function reproducirBeepCajaRegistradora() {
    if (!audioListo || !contextoAudio) return;
    try {
      if (contextoAudio.state === 'suspended') contextoAudio.resume();
      
      const ahora = contextoAudio.currentTime;
      
      // "Ding" agudo
      const osc1 = contextoAudio.createOscillator();
      const gain1 = contextoAudio.createGain();
      osc1.connect(gain1);
      gain1.connect(contextoAudio.destination);
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(1200, ahora);
      osc1.frequency.exponentialRampToValueAtTime(1800, ahora + 0.05);
      gain1.gain.setValueAtTime(0.3, ahora);
      gain1.gain.exponentialRampToValueAtTime(0.01, ahora + 0.12);
      osc1.start(ahora);
      osc1.stop(ahora + 0.12);
      
      // "Ca-ching" grave
      const osc2 = contextoAudio.createOscillator();
      const gain2 = contextoAudio.createGain();
      osc2.connect(gain2);
      gain2.connect(contextoAudio.destination);
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(200, ahora + 0.08);
      osc2.frequency.exponentialRampToValueAtTime(80, ahora + 0.25);
      gain2.gain.setValueAtTime(0, ahora + 0.08);
      gain2.gain.linearRampToValueAtTime(0.25, ahora + 0.10);
      gain2.gain.exponentialRampToValueAtTime(0.01, ahora + 0.30);
      osc2.start(ahora + 0.08);
      osc2.stop(ahora + 0.30);
      
      // "Click" metálico
      const osc3 = contextoAudio.createOscillator();
      const gain3 = contextoAudio.createGain();
      osc3.connect(gain3);
      gain3.connect(contextoAudio.destination);
      osc3.type = 'square';
      osc3.frequency.setValueAtTime(800, ahora + 0.22);
      gain3.gain.setValueAtTime(0.15, ahora + 0.22);
      gain3.gain.exponentialRampToValueAtTime(0.01, ahora + 0.28);
      osc3.start(ahora + 0.22);
      osc3.stop(ahora + 0.28);
      
    } catch (e) {}
  }

  // ============================================================
  // LÓGICA DEL ESCANER
  // ============================================================
  const estadoEl = document.getElementById('estado');
  const resultadoEl = document.getElementById('resultado');
  const codigoTextoEl = document.getElementById('codigo-texto');
  const textoInstruccionEl = document.querySelector('.encabezado p');
  const btnManual = document.getElementById('btn-manual');
  const btnVolver = document.getElementById('btn-volver');

  let escanerActivo = null;
  let yaDetectado = false;

  function iniciarEscaner() {
    yaDetectado = false;
    resultadoEl.classList.add('oculto');
    estadoEl.classList.remove('estado-error', 'oculto');
    estadoEl.classList.add('estado-espera');
    estadoEl.textContent = 'Iniciando cámara…';
    textoInstruccionEl.textContent = 'Apunta la cámara al código';

    if (escanerActivo) {
      escanerActivo.stop().catch(() => {}).then(() => {
        escanerActivo.clear();
        crearNuevoEscaner();
      });
    } else {
      crearNuevoEscaner();
    }
  }

  function crearNuevoEscaner() {
    escanerActivo = new Html5Qrcode('lector');
    const config = { fps: 10, qrbox: { width: 260, height: 160 } };

    escanerActivo.start(
      { facingMode: 'environment' },
      config,
      (decodedText) => {
        if (yaDetectado) return;
        yaDetectado = true;

        // 🔊 SONIDO CAJA REGISTRADORA
        reproducirBeepCajaRegistradora();

        // Mostrar breve confirmación
        codigoTextoEl.textContent = decodedText;
        resultadoEl.classList.remove('oculto');
        estadoEl.classList.add('oculto');
        textoInstruccionEl.textContent = 'Código detectado';

        // Enviar a la app principal
        enviarCodigoDeVuelta(decodedText);

        // Cerrar esta ventana después de 500ms
        setTimeout(() => {
          if (escanerActivo) {
            escanerActivo.stop().catch(() => {}).then(() => window.close());
          } else {
            window.close();
          }
        }, 500);
      },
      () => { /* sin código */ }
    ).catch((err) => {
      estadoEl.classList.remove('estado-espera');
      estadoEl.classList.add('estado-error');
      estadoEl.textContent = 'No se pudo acceder a la cámara: ' + err;
    });
  }

  function enviarCodigoDeVuelta(codigo) {
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({ tipo: 'codigo-escaneado', codigo: codigo }, '*');
    }
  }

  // Botón "Ingresar código manualmente"
  btnManual.addEventListener('click', function() {
    const codigo = prompt('Ingresa el código manualmente:');
    if (codigo && codigo.trim()) {
      yaDetectado = true;
      reproducirBeepCajaRegistradora();
      enviarCodigoDeVuelta(codigo.trim());
      setTimeout(() => window.close(), 300);
    }
  });

  // Botón "Volver a la app"
  btnVolver.addEventListener('click', function() {
    window.close();
  });

  // Iniciar al cargar
  iniciarEscaner();
</script>
</body>
</html>
