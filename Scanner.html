<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Escanear código de barras</title>
<style>
  :root {
    --color-tinta: #26362F;
    --color-tinta-suave: #5C6B62;
    --color-crate: #3E7D4C;
    --color-crate-fondo: #E7F2E7;
    --color-sello: #B23A2E;
    --color-sello-fondo: #FBEAE7;
    --color-papel: #EDEEE4;
    --color-superficie: #FCFCF8;
    --color-borde: #D9D9C9;
    --radio: 12px;
    --sombra: 0 2px 10px rgba(38, 54, 47, 0.10);
    --fuente: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --fuente-mono: ui-monospace, 'SFMono-Regular', Menlo, Consolas, 'Courier New', monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--color-papel); color: var(--color-tinta);
    font-family: var(--fuente); min-height: 100vh;
  }
  .pantalla { padding: 20px 16px 40px; max-width: 480px; margin: 0 auto; }
  .encabezado { text-align: center; margin-bottom: 16px; }
  .encabezado h1 { font-size: 18px; font-weight: 800; margin: 0 0 4px; }
  .encabezado p { font-size: 13px; color: var(--color-tinta-suave); margin: 0; }
  #lector {
    border-radius: var(--radio); overflow: hidden; box-shadow: var(--sombra);
    border: 1px solid var(--color-borde); background: #000;
  }
  .estado {
    margin-top: 14px; padding: 12px 14px; border-radius: var(--radio);
    font-size: 13.5px; font-weight: 600; text-align: center;
  }
  .estado-espera { background: var(--color-superficie); color: var(--color-tinta-suave); border: 1px solid var(--color-borde); }
  .estado-error { background: var(--color-sello-fondo); color: var(--color-sello); }
  .estado-exito { background: var(--color-crate-fondo); color: var(--color-crate); }
  .codigo-detectado {
    font-family: var(--fuente-mono); font-size: 20px; font-weight: 700;
    word-break: break-all; margin-top: 8px;
  }
  .btn {
    display: block; width: 100%; padding: 16px 18px; margin-top: 12px; border: none;
    border-radius: var(--radio); font-family: var(--fuente); font-size: 16px; font-weight: 700;
    cursor: pointer; text-align: center;
  }
  .btn-primario { background: var(--color-tinta); color: #fff; }
  .btn-secundario { background: var(--color-superficie); color: var(--color-tinta); border: 2px solid var(--color-borde); }
  .btn-manual {
    display: block; width: 100%; padding: 10px; margin-top: 8px; border: none;
    background: transparent; color: var(--color-tinta-suave); font-family: var(--fuente);
    font-size: 13px; font-weight: 600; cursor: pointer; text-align: center;
    text-decoration: underline;
  }
  .oculto { display: none !important; }
</style>
</head>
<body>

<div class="pantalla">
  <div class="encabezado">
    <h1>📷 Escanear código de barras</h1>
    <p id="texto-instruccion">Apunta la cámara al código</p>
  </div>

  <div id="lector"></div>

  <div id="estado" class="estado estado-espera">Iniciando cámara…</div>

  <div id="resultado" class="oculto">
    <div class="estado estado-exito">
      ✅ Código detectado
      <div id="codigo-texto" class="codigo-detectado"></div>
    </div>
    <button id="btn-otra-vez" class="btn btn-secundario">Escanear otro código</button>
  </div>
  
  <button id="btn-manual" class="btn-manual oculto">¿No se pudo escanear? Ingresar código manualmente</button>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  // ============================================================
  // SONIDO DE CONFIRMACIÓN - Web Audio API
  // Se inicializa en la PRIMERA interacción del usuario (requerido por
  // políticas de autoplay de Chrome/Safari en móviles)
  // ============================================================
  let contextoAudio = null;
  let audioListo = false;

  function inicializarAudio() {
    if (audioListo) return;
    try {
      contextoAudio = new (window.AudioContext || window.webkitAudioContext)();
      audioListo = true;
    } catch (e) {
      console.log('Audio no disponible');
    }
  }

  // Escuchar cualquier toque para desbloquear el audio
  document.addEventListener('touchstart', inicializarAudio, { once: true });
  document.addEventListener('click', inicializarAudio, { once: true });

  function reproducirBeep() {
    if (!audioListo || !contextoAudio) return;
    try {
      if (contextoAudio.state === 'suspended') contextoAudio.resume();
      
      const ahora = contextoAudio.currentTime;
      const osc = contextoAudio.createOscillator();
      const gain = contextoAudio.createGain();
      
      osc.connect(gain);
      gain.connect(contextoAudio.destination);
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1500, ahora);        // tono agudo
      osc.frequency.exponentialRampToValueAtTime(800, ahora + 0.1);
      
      gain.gain.setValueAtTime(0.4, ahora);
      gain.gain.exponentialRampToValueAtTime(0.01, ahora + 0.15);
      
      osc.start(ahora);
      osc.stop(ahora + 0.15);
    } catch (e) {
      // silencioso si falla
    }
  }

  // ============================================================
  // LÓGICA DEL ESCANER
  // ============================================================
  const estadoEl = document.getElementById('estado');
  const resultadoEl = document.getElementById('resultado');
  const codigoTextoEl = document.getElementById('codigo-texto');
  const btnOtraVez = document.getElementById('btn-otra-vez');
  const btnManual = document.getElementById('btn-manual');
  const textoInstruccionEl = document.getElementById('texto-instruccion');

  let escanerActivo = null;
  let codigoDetectado = '';

  function iniciarEscaner() {
    // Resetear UI
    resultadoEl.classList.add('oculto');
    btnManual.classList.add('oculto');
    estadoEl.classList.remove('estado-error', 'oculto');
    estadoEl.classList.add('estado-espera');
    estadoEl.textContent = 'Iniciando cámara…';
    textoInstruccionEl.textContent = 'Apunta la cámara al código';
    codigoDetectado = '';

    // Si ya hay un escáner, limpiarlo primero
    if (escanerActivo) {
      escanerActivo.stop().catch(() => {}).then(() => {
        escanerActivo.clear();
        crearNuevoEscaner();
      });
    } else {
      crearNuevoEscaner();
    }
  }

  function crearNuevoEscaner() {
    escanerActivo = new Html5Qrcode('lector');
    const config = { fps: 10, qrbox: { width: 260, height: 160 } };

    escanerActivo.start(
      { facingMode: 'environment' },
      config,
      (decodedText) => {
        // Evitar lecturas múltiples del mismo código
        if (codigoDetectado) return;
        codigoDetectado = decodedText;

        // 🔊 BEEP INMEDIATO al detectar código
        reproducirBeep();

        // PAUSAR (no detener) la cámara para mantenerla viva
        escanerActivo.pause(true);

        // Mostrar resultado
        codigoTextoEl.textContent = decodedText;
        resultadoEl.classList.remove('oculto');
        estadoEl.classList.add('oculto');
        textoInstruccionEl.textContent = 'Código detectado';
        btnManual.classList.remove('oculto');

        // Enviar a la app principal INMEDIATAMENTE
        enviarCodigoDeVuelta(decodedText);
      },
      () => { /* sin código en este fotograma */ }
    ).catch((err) => {
      estadoEl.classList.remove('estado-espera');
      estadoEl.classList.add('estado-error');
      estadoEl.textContent = 'No se pudo acceder a la cámara: ' + err;
      btnManual.classList.remove('oculto');
    });
  }

  function reanudarEscaner() {
    codigoDetectado = '';
    resultadoEl.classList.add('oculto');
    estadoEl.classList.remove('oculto', 'estado-error');
    estadoEl.classList.add('estado-espera');
    estadoEl.textContent = 'Listo, apunta al siguiente código';
    textoInstruccionEl.textContent = 'Apunta la cámara al código';

    if (escanerActivo) {
      try {
        escanerActivo.resume();
        return;
      } catch (e) {
        // si falla resume, reiniciar
      }
    }
    iniciarEscaner();
  }

  function enviarCodigoDeVuelta(codigo) {
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({ tipo: 'codigo-escaneado', codigo: codigo }, '*');
      return;
    }
    const params = new URLSearchParams(location.search);
    const volver = params.get('volver');
    if (volver) {
      const separador = volver.includes('?') ? '&' : '?';
      location.href = volver + separador + 'codigo=' + encodeURIComponent(codigo);
      return;
    }
    estadoEl.classList.remove('oculto');
    estadoEl.classList.add('estado-error');
    estadoEl.textContent = 'No se detectó la app de destino. Copia manualmente: ' + codigo;
    btnManual.classList.remove('oculto');
  }

  // Botón "Escanear otro"
  btnOtraVez.addEventListener('click', reanudarEscaner);

  // Botón "Ingresar código manualmente" desde el escáner
  btnManual.addEventListener('click', function() {
    const codigo = prompt('Ingresa el código manualmente:');
    if (codigo && codigo.trim()) {
      codigoDetectado = codigo.trim();
      reproducirBeep();
      enviarCodigoDeVuelta(codigoDetectado);
      codigoTextoEl.textContent = codigoDetectado;
      resultadoEl.classList.remove('oculto');
      estadoEl.classList.add('oculto');
    }
  });

  // Escuchar mensajes de la app principal
  window.addEventListener('message', function (evento) {
    if (!evento.data) return;
    if (evento.data.tipo === 'continuar-escaneo') reanudarEscaner();
    if (evento.data.tipo === 'cerrar-escaner') {
      if (escanerActivo) {
        escanerActivo.stop().catch(() => {}).then(() => window.close());
      } else {
        window.close();
      }
    }
  });

  // Iniciar al cargar
  iniciarEscaner();
</script>
</body>
</html>
